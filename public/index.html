<!DOCTYPE html>
<html>
<head>
  <title>Bolo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #0f0f1a, #000);
      color: white;
    }

    #chat {
      height: 100vh;
      overflow-y: auto;
      padding: 20px 15px 90px;
    }

    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 16px;
      line-height: 1.4;
    }

    .me {
      background: linear-gradient(135deg, #00f5ff, #6a5cff);
      margin-left: auto;
    }

    .them {
      background: #1c1c2a;
    }

    #bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: rgba(0,0,0,.6);
      backdrop-filter: blur(10px);
    }

    input {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      outline: none;
      background: #12121c;
      color: white;
    }

    button {
      margin-left: 10px;
      border: none;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 600;
      background: linear-gradient(135deg,#00f5ff,#6a5cff);
      color: black;
      cursor: pointer;
    }

    .center {
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-size:20px;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="Say something…" autocomplete="off">
  <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const chat = document.getElementById("chat");
const input = document.getElementById("msg");

// Room full
socket.on("room-full",()=>{
  document.body.innerHTML='<div class=center>Room Full</div>';
});

// Receive message
socket.on("message", msg=>{
  add(msg,false);
});

function add(msg,self){
  const d=document.createElement("div");
  d.className="bubble "+(self?"me":"them");
  d.textContent=msg;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

function send(){
  const v=input.value.trim();
  if(!v) return;
  socket.emit("message", v);
  add(v,true);
  input.value="";
}

// Enter key support
input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});
</script>
</body>
</html>
