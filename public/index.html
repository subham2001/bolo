<!DOCTYPE html>
<html>
<head>
  <title>Bolo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: radial-gradient(circle at top, #0f0f1a, #000);
      color: white;
      overflow: hidden;
    }

    #chat {
      height: 100vh;
      overflow-y: auto;
      padding: 20px 15px 90px;
    }

    /* Chat bubbles */
    .bubble {
      max-width: 75%;
      padding: 12px 14px;
      margin: 8px 0;
      border-radius: 16px;
      line-height: 1.4;
      animation: fadeIn .25s ease;
    }

    .me {
      background: linear-gradient(135deg, #00f5ff, #6a5cff);
      margin-left: auto;
      border-bottom-right-radius: 6px;
      box-shadow: 0 0 12px rgba(0,245,255,.3);
    }

    .them {
      background: #1c1c2a;
      border-bottom-left-radius: 6px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom bar */
    #bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,.5);
      border-top: 1px solid rgba(255,255,255,.05);
    }

    input {
      flex: 1;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      background: #12121c;
      color: white;
    }

    button {
      margin-left: 10px;
      border: none;
      padding: 0 18px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg,#00f5ff,#6a5cff);
      color: black;
      box-shadow: 0 0 12px rgba(0,245,255,.5);
      transition: transform .15s ease;
    }

    button:active { transform: scale(.95); }

    .center {
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-size:20px;
      opacity:.7;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="Say something…" autocomplete="off">
  <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let pc, dc;
const chat = document.getElementById("chat");
const input = document.getElementById("msg");

// Room full
socket.on("room-full",()=>{
  document.body.innerHTML='<div class=center>Room Full</div>';
});

// Add message bubble
function add(msg, self=false){
  const d=document.createElement("div");
  d.className="bubble "+(self?"me":"them");
  d.textContent=msg;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

// ===== WebRTC =====
async function start(isCaller){
  pc = new RTCPeerConnection({
    iceServers:[
      {urls:"stun:stun.l.google.com:19302"},
      {urls:"stun:stun1.l.google.com:19302"}
    ]
  });

  pc.ondatachannel = e=>{
    dc = e.channel;
    setupDC();
  };

  if(isCaller){
    dc = pc.createDataChannel("chat");
    setupDC();
  }

  pc.onicecandidate = e=>{
    if(e.candidate) socket.emit("signal",{ice:e.candidate});
  };

  socket.on("signal", async data=>{
    if(data.sdp){
      await pc.setRemoteDescription(data.sdp);
      if(data.sdp.type==="offer"){
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("signal",{sdp:pc.localDescription});
      }
    }
    if(data.ice){
      try{ await pc.addIceCandidate(data.ice);}catch{}
    }
  });

  if(isCaller){
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal",{sdp:pc.localDescription});
  }
}

function setupDC(){
  dc.onopen = ()=>console.log("Connected");
  dc.onmessage = e=>add(e.data);
}

socket.on("peer-ready", ()=>start(true));
socket.on("connect", ()=>start(false));

// Send
function send(){
  const v=input.value.trim();
  if(!dc || dc.readyState!=="open"){
    alert("Connecting...");
    return;
  }
  dc.send(v);
  add(v,true);
  input.value="";
}

// Enter key
input.addEventListener("keydown",e=>{
  if(e.key==="Enter") send();
});
</script>
</body>
</html>
