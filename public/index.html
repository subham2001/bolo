<!DOCTYPE html>
<html>
<head>
  <title>Bolo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      padding-bottom: 80px;
    }

    #bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      border-top: 1px solid #222;
      background: #000;
    }

    input {
      flex: 1;
      background: #000;
      color: #fff;
      border: none;
      padding: 18px;
      font-size: 16px;
      outline: none;
    }

    button {
      background: #111;
      color: #fff;
      border: none;
      padding: 0 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .center {
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      font-size:22px;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="bar">
  <input id="msg" placeholder="Type..." autocomplete="off">
  <button id="sendBtn">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let pc, dc;
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");

socket.on("room-full",()=>{
  document.body.innerHTML='<div class=center>ROOM FULL</div>';
});

function add(m,self=false){
  const d=document.createElement("div");
  d.textContent=(self?"You: ":"Them: ")+m;
  d.style.marginBottom = "8px";
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function init(isCaller) {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" }
    ]
  });

  // Receiver side
  pc.ondatachannel = e => {
    dc = e.channel;
    dc.onopen = () => console.log("Connected");
    dc.onmessage = e => add(e.data);
  };

  // Caller side
  if (isCaller) {
    dc = pc.createDataChannel("chat");
    dc.onopen = () => console.log("Connected");
    dc.onmessage = e => add(e.data);
  }

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("signal", { ice: e.candidate });
    }
  };

  socket.on("signal", async data => {
    if (data.sdp) {
      await pc.setRemoteDescription(data.sdp);

      if (data.sdp.type === "offer") {
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit("signal", { sdp: pc.localDescription });
      }
    }

    if (data.ice) {
      try { await pc.addIceCandidate(data.ice); } catch {}
    }
  });

  // Caller creates offer
  if (isCaller) {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { sdp: pc.localDescription });
  }
}

socket.on("peer-joined",()=>init(true));
socket.on("connect",()=>init(false));

function send(){
  const v = input.value.trim();

  if(!dc || dc.readyState !== "open"){
    alert("Still connecting...");
    return;
  }

  if(v){
    dc.send(v);
    add(v, true);
    input.value = "";
  }
}

sendBtn.onclick = send;

// ENTER key support
input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    e.preventDefault();
    send();
  }
});
</script>
</body>
</html>
