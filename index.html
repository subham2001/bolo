<!DOCTYPE html>
<html>
<head>
  <title>Bolo</title>
  <style>
    body{margin:0;background:#000;color:#fff;font-family:monospace;display:flex;flex-direction:column;height:100vh}
    #chat{flex:1;padding:20px;overflow-y:auto}
    #bar{display:flex;border-top:1px solid #222}
    input{flex:1;background:#000;color:#fff;border:none;padding:15px;outline:none}
    button{background:#000;color:#fff;border:none;padding:15px}
    .center{display:flex;align-items:center;justify-content:center;height:100vh;font-size:22px}
  </style>
</head>
<body>
<div id="chat"></div>
<div id="bar">
  <input id="msg" placeholder="Type...">
  <button onclick="send()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let pc, dc;
const chat = document.getElementById("chat");

socket.on("room-full",()=>document.body.innerHTML='<div class=center>ROOM FULL</div>');

function add(m,self=false){
  const d=document.createElement("div");
  d.textContent=(self?"You: ":"Them: ")+m;
  chat.appendChild(d);
  chat.scrollTop=chat.scrollHeight;
}

async function init(caller){
  pc=new RTCPeerConnection();

  pc.ondatachannel=e=>{
    dc=e.channel;
    dc.onmessage=e=>add(e.data);
  };

  if(caller){
    dc=pc.createDataChannel("chat");
    dc.onmessage=e=>add(e.data);
  }

  pc.onicecandidate=e=>{
    if(e.candidate)socket.emit("signal",{ice:e.candidate});
  };

  socket.on("signal",async d=>{
    if(d.sdp){
      await pc.setRemoteDescription(d.sdp);
      if(d.sdp.type==="offer"){
        const a=await pc.createAnswer();
        await pc.setLocalDescription(a);
        socket.emit("signal",{sdp:pc.localDescription});
      }
    }
    if(d.ice)await pc.addIceCandidate(d.ice);
  });

  if(caller){
    const o=await pc.createOffer();
    await pc.setLocalDescription(o);
    socket.emit("signal",{sdp:o});
  }
}

socket.on("peer-joined",()=>init(true));
socket.on("connect",()=>init(false));

function send(){
  const v=msg.value;
  if(dc&&v){
    dc.send(v);
    add(v,true);
    msg.value="";
  }
}
</script>
</body>
</html>
